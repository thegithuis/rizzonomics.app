<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rizzonomics</title>
  <link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0ebe0;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }
    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-family: 'Shrikhand', cursive;
      font-size: 48px;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 16px;
      color: #1a1a1a;
      margin-bottom: 48px;
    }
    .heading {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .subheading {
      font-size: 15px;
      color: #555;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .steps {
      background: #e0d9cc;
      border-radius: 20px;
      padding: 24px;
      text-align: left;
      margin-bottom: 32px;
    }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }
    .step:last-child { margin-bottom: 0; }
    .step-number {
      background: #ff4d00;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-text {
      font-size: 15px;
      line-height: 1.5;
      padding-top: 4px;
    }
    .step-text strong { color: #1a1a1a; }
  </style>
  <script>
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    if (!/musical_ly|trill|instagram|fbav|fban/i.test(ua)) {
      if (/android/i.test(ua)) {
        window.location.href = "https://rizzonomics.app/tiktok";
      } else {
        window.location.href = "itms-apps://itunes.apple.com/app/id6760429232";
      }
    }
  </script>
</head>
<body>
  <div class="container">
    <div class="logo"><span style="color:#ff4d00">Rizz</span><span style="color:#1a1a1a">onomics</span></div>
    <div class="tagline">Your AI Wingman</div>
    <div class="heading">Open in Your Browser</div>
    <div class="subheading">To download the app, please open this page in Safari or Chrome.</div>
    <div class="steps">
      <div class="step">
        <div class="step-number">1</div>
        <div class="step-text">Tap the <strong>three dots menu (...)</strong> in the top right corner</div>
      </div>
      <div class="step">
        <div class="step-number">2</div>
        <div class="step-text">Select <strong>"Open in browser"</strong></div>
      </div>
      <div class="step">
        <div class="step-number">3</div>
        <div class="step-text">You'll be automatically redirected to download the app</div>
      </div>
    </div>
  </div>
</body>
</html>
