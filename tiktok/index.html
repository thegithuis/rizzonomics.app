<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rizzonomics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }
    .container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-size: 48px;
      font-weight: 900;
      color: #FF6B00;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 48px;
    }
    .heading {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .subheading {
      font-size: 15px;
      color: #aaa;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .steps {
      background: #111;
      border-radius: 20px;
      padding: 24px;
      text-align: left;
      margin-bottom: 32px;
    }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }
    .step:last-child { margin-bottom: 0; }
    .step-number {
      background: #FF6B00;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-text {
      font-size: 15px;
      line-height: 1.5;
      padding-top: 4px;
    }
    .step-text strong { color: #fff; }
    .download-btn {
      display: block;
      background: #FF6B00;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      padding: 18px 24px;
      border-radius: 14px;
      text-decoration: none;
      margin-bottom: 12px;
    }
  </style>
  <script>
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    if (!/musical_ly|trill|instagram|fbav|fban/i.test(ua)) {
      if (/android/i.test(ua)) {
        window.location.href = "https://rizzonomics.app/tiktok";
      } else {
        window.location.href = "https://apps.apple.com/us/app/rizzonomics-ai-wingman/id6760429232";
      }
    }
  </script>
</head>
<body>
  <div class="container">
    <div class="logo">Rizzonomics</div>
    <div class="tagline">Your AI Wingman</div>
    <div class="heading">Open in Your Browser</div>
    <div class="subheading">To download the app, please open this page in Safari or Chrome.</div>
    <div class="steps">
      <div class="step">
        <div class="step-number">1</div>
        <div class="step-text">Tap the <strong>three dots menu (...)</strong> in the top right corner</div>
      </div>
      <div class="step">
        <div class="step-number">2</div>
        <div class="step-text">Select <strong>"Open in browser"</strong></div>
      </div>
      <div class="step">
        <div class="step-number">3</div>
        <div class="step-text">You'll be automatically redirected to download the app</div>
      </div>
    </div>
    <a class="download-btn" href="https://apps.apple.com/us/app/rizzonomics-ai-wingman/id6760429232">Download on App Store</a>
  </div>
</body>
</html>
